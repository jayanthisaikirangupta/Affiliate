<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <radialGradient id="iToePad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="40%" stop-color="#F58220"/>
      <stop offset="100%" stop-color="#D96D0A"/>
    </radialGradient>
    <radialGradient id="iMainOrange" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="40%" stop-color="#F58220"/>
      <stop offset="100%" stop-color="#D96D0A"/>
    </radialGradient>
    <radialGradient id="iMainDark" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3A3A3C"/>
      <stop offset="60%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>

  <g transform="translate(12, 13)">
    <!-- Main pad - dark bottom -->
    <path d="M-7.5,1 C-7.5,4.5 -5.5,8 -2.8,9.5 C-1,10.3 1,10.3 2.8,9.5 C5.5,8 7.5,4.5 7.5,1 C7.5,-1.5 5,-4 0,-4 C-5,-4 -7.5,-1.5 -7.5,1 Z"
          fill="url(#iMainDark)"/>

    <!-- Main pad - orange upper with wave clip -->
    <clipPath id="iWaveClip">
      <path d="M-9,-6 L9,-6 L9,2 C6,5 3,-1 0,3 C-3,-1 -6,5 -9,2 Z"/>
    </clipPath>
    <path d="M-7.5,1 C-7.5,4.5 -5.5,8 -2.8,9.5 C-1,10.3 1,10.3 2.8,9.5 C5.5,8 7.5,4.5 7.5,1 C7.5,-1.5 5,-4 0,-4 C-5,-4 -7.5,-1.5 -7.5,1 Z"
          fill="url(#iMainOrange)" clip-path="url(#iWaveClip)"/>

    <!-- Toe pad 1 (far left) -->
    <ellipse cx="-6" cy="-6.5" rx="2" ry="2.6" transform="rotate(-18, -6, -6.5)" fill="url(#iToePad)"/>

    <!-- Toe pad 2 (inner left) -->
    <ellipse cx="-2" cy="-8.5" rx="2" ry="2.6" transform="rotate(-4, -2, -8.5)" fill="url(#iToePad)"/>

    <!-- Toe pad 3 (inner right) -->
    <ellipse cx="2" cy="-8.5" rx="2" ry="2.6" transform="rotate(4, 2, -8.5)" fill="url(#iToePad)"/>

    <!-- Toe pad 4 (far right) -->
    <ellipse cx="6" cy="-6.5" rx="2" ry="2.6" transform="rotate(18, 6, -6.5)" fill="url(#iToePad)"/>
  </g>
</svg>