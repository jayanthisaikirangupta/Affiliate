<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Orange rounded rectangle background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#F58220"/>

  <!-- Paw print - white, centered -->
  <g transform="translate(16, 15)">
    <!-- Main pad - lower portion slightly darker for contrast -->
    <path d="M-8,1 C-8,5 -6,8.5 -3,10 C-1,11 1,11 3,10 C6,8.5 8,5 8,1 C8,-2 5,-4.5 0,-4.5 C-5,-4.5 -8,-2 -8,1 Z"
          fill="#E8E0D8"/>

    <!-- Main pad - upper white portion with wave clip -->
    <clipPath id="fwClip">
      <path d="M-10,-6 L10,-6 L10,2 C7,5 3,-1 0,3 C-3,-1 -7,5 -10,2 Z"/>
    </clipPath>
    <path d="M-8,1 C-8,5 -6,8.5 -3,10 C-1,11 1,11 3,10 C6,8.5 8,5 8,1 C8,-2 5,-4.5 0,-4.5 C-5,-4.5 -8,-2 -8,1 Z"
          fill="white" clip-path="url(#fwClip)"/>

    <!-- Toe pad 1 (far left) -->
    <ellipse cx="-6.5" cy="-7" rx="2.2" ry="2.8" transform="rotate(-18, -6.5, -7)" fill="white"/>

    <!-- Toe pad 2 (inner left) -->
    <ellipse cx="-2.2" cy="-9" rx="2.2" ry="2.8" transform="rotate(-4, -2.2, -9)" fill="white"/>

    <!-- Toe pad 3 (inner right) -->
    <ellipse cx="2.2" cy="-9" rx="2.2" ry="2.8" transform="rotate(4, 2.2, -9)" fill="white"/>

    <!-- Toe pad 4 (far right) -->
    <ellipse cx="6.5" cy="-7" rx="2.2" ry="2.8" transform="rotate(18, 6.5, -7)" fill="white"/>
  </g>
</svg>