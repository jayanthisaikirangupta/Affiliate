<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="240" height="120">
  <defs>
    <!-- Glossy gradient for white toe pads -->
    <radialGradient id="wToePadGrad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </radialGradient>
    <!-- Gradient for main pad white top -->
    <radialGradient id="wMainWhite" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </radialGradient>
    <!-- Lighter gray for main pad bottom -->
    <radialGradient id="wMainGray" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="60%" stop-color="#CCCCCC"/>
      <stop offset="100%" stop-color="#B8B8B8"/>
    </radialGradient>
  </defs>

  <!-- ===== PAW PRINT (white version) ===== -->
  <g transform="translate(120, 36)">
    <!-- Main pad - gray bottom portion -->
    <path d="M-22,2 C-22,12 -16,22 -8,26 C-3,28.5 3,28.5 8,26 C16,22 22,12 22,2 C22,-4 14,-8 0,-8 C-14,-8 -22,-4 -22,2 Z"
          fill="url(#wMainGray)"/>

    <!-- Main pad - white top portion with wave clip -->
    <clipPath id="wWaveClip">
      <path d="M-24,-14 L24,-14 L24,4 C18,10 10,-1 0,6 C-10,-1 -18,10 -24,4 Z"/>
    </clipPath>
    <path d="M-22,2 C-22,12 -16,22 -8,26 C-3,28.5 3,28.5 8,26 C16,22 22,12 22,2 C22,-4 14,-12 0,-12 C-14,-12 -22,-4 -22,2 Z"
          fill="url(#wMainWhite)" clip-path="url(#wWaveClip)"/>

    <!-- Subtle shine on main pad -->
    <ellipse cx="-4" cy="-5" rx="8" ry="4" fill="white" opacity="0.3"/>

    <!-- Toe pad 1 (far left) -->
    <ellipse cx="-17" cy="-17" rx="5.5" ry="7" transform="rotate(-20, -17, -17)" fill="url(#wToePadGrad)"/>
    <ellipse cx="-18.5" cy="-20" rx="2" ry="1.5" fill="white" opacity="0.5"/>

    <!-- Toe pad 2 (inner left) -->
    <ellipse cx="-6" cy="-22" rx="5.5" ry="7" transform="rotate(-5, -6, -22)" fill="url(#wToePadGrad)"/>
    <ellipse cx="-7" cy="-25" rx="2" ry="1.5" fill="white" opacity="0.5"/>

    <!-- Toe pad 3 (inner right) -->
    <ellipse cx="6" cy="-22" rx="5.5" ry="7" transform="rotate(5, 6, -22)" fill="url(#wToePadGrad)"/>
    <ellipse cx="5" cy="-25" rx="2" ry="1.5" fill="white" opacity="0.5"/>

    <!-- Toe pad 4 (far right) -->
    <ellipse cx="17" cy="-17" rx="5.5" ry="7" transform="rotate(20, 17, -17)" fill="url(#wToePadGrad)"/>
    <ellipse cx="16" cy="-20" rx="2" ry="1.5" fill="white" opacity="0.5"/>
  </g>

  <!-- ===== TEXT: PetGearHub (all white) ===== -->
  <text x="120" y="88" text-anchor="middle" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="26" letter-spacing="-0.5" fill="#FFFFFF">
    <tspan>Pet</tspan><tspan>Gear</tspan><tspan>Hub</tspan>
  </text>

  <!-- ===== WHITE SWOOSH UNDERLINE ===== -->
  <path d="M58,96 Q120,106 182,96" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
</svg>