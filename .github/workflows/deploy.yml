name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Vercel deploys automatically via its native GitHub integration (free Hobby plan).
  # This job only triggers a Render backend redeploy on push to main.
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
